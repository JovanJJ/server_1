name: Keep Render Awake

on:
  schedule:
    # This runs every 14 minutes (Render sleeps after 15)
    - cron: '*/14 * * * *'
  workflow_dispatch: # This button lets you test it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: curl -s https://server-1-6vms.onrender.com/ping
